<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game 🐍</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            font-family: 'Arial', sans-serif;
        }
        
        .container {
            text-align: center;
        }
        
        h1 {
            color: #00ff00;
            margin-bottom: 20px;
            font-size: 2em;
        }
        
        canvas {
            border: 4px solid #00ff00;
            background: #000;
            display: block;
            margin: 0 auto;
            max-width: 90vw;
            max-height: 90vh;
        }
        
        .controls {
            color: #00ff00;
            margin-top: 20px;
            font-size: 1.1em;
        }
        
        .controls p {
            margin: 10px 0;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 1.5em;
            }
            
            .controls {
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE GAME 🐍</h1>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <p>⬆️ ⬅️ ➡️ ⬇️ - Mueve la serpiente</p>
            <p>ESPACIO - Pausa/Reanuda</p>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
